name: manul_time
description: "An infinite, relaxing counter of manuls (Pallas's cats)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management — works on all Flutter platforms
  flutter_riverpod: ^2.5.1
